<!DOCTYPE html>
<html>
<head>
    <title>AI Knowledge Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    
    <!-- LEFT: Tree Navigation -->
    <div class="sidebar">
        <h2>AI Knowledge</h2>
        <ul class="tree">
            <li>
                <span class="toggle">▶</span> AI Strategy
                <ul>
                    <li data-page="content/ai-strategy.html">Enterprise AI</li>
                </ul>
            </li>
    
            <li>
                <span class="toggle">▶</span> LLM
                <ul>
                    <li data-page="content/llm-evaluation.html">Evaluation</li>
                    <li data-page="content/agentic-ai.html">Agentic AI</li>
                </ul>
            </li>
        </ul>
    </div>
        

    <!-- RIGHT: Content Area -->
    <div class="content" id="content-area">
        <h1>Welcome</h1>
        <p>Select a topic from the left.</p>
    </div>

</div>

<script>
function loadContent(page) {
    fetch(page)
        .then(response => response.text())
        .then(data => {
            document.getElementById("content-area").innerHTML = data;
        })
        .catch(error => {
            document.getElementById("content-area").innerHTML = "<p>Error loading content.</p>";
        });
}
</script>

<script>
document.querySelectorAll(".toggle").forEach(toggle => {
    toggle.addEventListener("click", function() {
        let sublist = this.parentElement.querySelector("ul");
        if (sublist.style.display === "block") {
            sublist.style.display = "none";
            this.textContent = "▶";
        } else {
            sublist.style.display = "block";
            this.textContent = "▼";
        }
    });
});

document.querySelectorAll("[data-page]").forEach(item => {
    item.addEventListener("click", function() {
        loadContent(this.dataset.page);
    });
});
</script>

</body>
</html>
