<!DOCTYPE html>
<html>
<head>
    <title>AI Knowledge Blog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    
    <!-- LEFT: Tree Navigation -->
    <div class="sidebar">
        <h2>Topics</h2>
        <ul class="tree">
            <li>
                AI Strategy
                <ul>
                    <li onclick="loadContent('content/ai-strategy.html')">Enterprise AI</li>
                </ul>
            </li>
            <li>
                LLM
                <ul>
                    <li onclick="loadContent('content/llm-evaluation.html')">Evaluation Framework</li>
                    <li onclick="loadContent('content/agentic-ai.html')">Agentic AI</li>
                </ul>
            </li>
        </ul>
    </div>

    <!-- RIGHT: Content Area -->
    <div class="content" id="content-area">
        <h1>Welcome</h1>
        <p>Select a topic from the left.</p>
    </div>

</div>

<script>
function loadContent(page) {
    fetch(page)
        .then(response => response.text())
        .then(data => {
            document.getElementById("content-area").innerHTML = data;
        })
        .catch(error => {
            document.getElementById("content-area").innerHTML = "<p>Error loading content.</p>";
        });
}
</script>

</body>
</html>
